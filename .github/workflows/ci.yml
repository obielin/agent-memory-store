name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: pip install -e ".[dev]"

      - name: Test
        run: pytest tests/ -v --tb=short

  validate:
    name: Validate package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -e .

      - name: Verify zero-dependency import
        run: |
          python -c "
          from agent_memory import MemoryStore, Memory, MemoryType, AuditEvent, SearchResult
          mem = MemoryStore(':memory:')
          m = mem.add('test memory', tags=['test'])
          results = mem.search('test')
          assert len(results) > 0
          mem.forget(memory_id=m.id)
          print('All imports and basic operations OK')
          "

      - name: Verify CLI entry point
        run: agent-memory --help || true
